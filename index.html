<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mercado ARS | Dólar, Bitcoin y Ethereum</title>
    <style>
      :root {
        --bg: #060b1a;
        --card: #0f172a;
        --line: rgba(148, 163, 184, 0.2);
        --text: #e2e8f0;
        --muted: #94a3b8;
        --accent: #22d3ee;
        --accent-2: #a78bfa;
        --green: #22c55e;
        --red: #ef4444;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
        color: var(--text);
        background: radial-gradient(1200px 700px at 15% 0%, #1e1b4b 0%, transparent 55%),
          radial-gradient(1200px 700px at 100% 100%, #0f766e 0%, transparent 50%), var(--bg);
        padding: 28px;
      }

      .container {
        width: min(1050px, 100%);
        margin: 0 auto;
      }

      .header {
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 22px;
        background: linear-gradient(150deg, rgba(15, 23, 42, 0.8), rgba(30, 41, 59, 0.55));
        backdrop-filter: blur(6px);
      }

      h1 {
        margin: 0;
        font-size: clamp(1.55rem, 2.8vw, 2.15rem);
      }

      .subtitle {
        margin: 8px 0 0;
        color: var(--muted);
      }

      .toolbar {
        margin-top: 16px;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
      }

      button {
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        cursor: pointer;
        color: #031621;
        font-weight: 700;
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
      }

      .muted {
        color: var(--muted);
        font-size: 0.92rem;
      }

      .grid {
        margin-top: 22px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 16px;
      }

      .card {
        background: linear-gradient(160deg, rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.6));
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 18px;
        box-shadow: 0 14px 35px rgba(0, 0, 0, 0.25);
      }

      .label {
        margin: 0;
        color: #cbd5e1;
        font-size: 0.93rem;
      }

      .value {
        margin: 10px 0 6px;
        font-size: clamp(1.35rem, 2.4vw, 1.8rem);
        font-weight: 800;
      }

      .pill {
        display: inline-block;
        padding: 4px 9px;
        border-radius: 999px;
        font-size: 0.78rem;
        font-weight: 700;
      }

      .up {
        background: rgba(34, 197, 94, 0.18);
        color: #86efac;
      }

      .down {
        background: rgba(239, 68, 68, 0.15);
        color: #fda4af;
      }

      .neutral {
        background: rgba(148, 163, 184, 0.2);
        color: #cbd5e1;
      }

      .error {
        margin-top: 16px;
        border: 1px solid rgba(239, 68, 68, 0.45);
        background: rgba(127, 29, 29, 0.28);
        border-radius: 12px;
        padding: 12px;
        display: none;
      }

      .error.show {
        display: block;
      }

      .loading {
        opacity: 0.75;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="header">
        <h1>Valores en pesos argentinos (ARS)</h1>
        <p class="subtitle">Cotizaciones de dólar, Bitcoin y Ethereum comparadas contra el peso argentino.</p>
        <div class="toolbar">
          <button id="refresh">Actualizar ahora</button>
          <span class="muted" id="lastUpdate">Sin actualizar todavía.</span>
        </div>
      </section>

      <section class="grid" id="grid">
        <article class="card" data-key="usd">
          <p class="label">Dólar (USD/ARS)</p>
          <p class="value" id="usd-value">--</p>
          <span class="pill neutral" id="usd-change">Esperando datos</span>
        </article>

        <article class="card" data-key="btc">
          <p class="label">Bitcoin (BTC/ARS)</p>
          <p class="value" id="btc-value">--</p>
          <span class="pill neutral" id="btc-change">Esperando datos</span>
        </article>

        <article class="card" data-key="eth">
          <p class="label">Ethereum (ETH/ARS)</p>
          <p class="value" id="eth-value">--</p>
          <span class="pill neutral" id="eth-change">Esperando datos</span>
        </article>
      </section>

      <section class="error" id="errorBox"></section>
    </main>

    <script>
      const refreshButton = document.getElementById("refresh");
      const lastUpdate = document.getElementById("lastUpdate");
      const errorBox = document.getElementById("errorBox");
      const grid = document.getElementById("grid");

      const ids = {
        usd: { value: document.getElementById("usd-value"), change: document.getElementById("usd-change") },
        btc: { value: document.getElementById("btc-value"), change: document.getElementById("btc-change") },
        eth: { value: document.getElementById("eth-value"), change: document.getElementById("eth-change") },
      };

      const previous = { usd: null, btc: null, eth: null };

      const formatARS = (value) =>
        new Intl.NumberFormat("es-AR", { style: "currency", currency: "ARS", maximumFractionDigits: 2 }).format(value);

      function setChangePill(key, current) {
        const node = ids[key].change;
        const old = previous[key];

        node.className = "pill";
        if (old === null) {
          node.classList.add("neutral");
          node.textContent = "Primer dato cargado";
          previous[key] = current;
          return;
        }

        const diff = ((current - old) / old) * 100;
        previous[key] = current;

        if (Math.abs(diff) < 0.01) {
          node.classList.add("neutral");
          node.textContent = "Sin cambios";
        } else if (diff > 0) {
          node.classList.add("up");
          node.textContent = `▲ ${diff.toFixed(2)}%`;
        } else {
          node.classList.add("down");
          node.textContent = `▼ ${Math.abs(diff).toFixed(2)}%`;
        }
      }

      function showError(message) {
        errorBox.textContent = message;
        errorBox.className = "error show";
      }

      function hideError() {
        errorBox.textContent = "";
        errorBox.className = "error";
      }

      async function getDollarARS() {
        const response = await fetch("https://dolarapi.com/v1/dolares/oficial");
        if (!response.ok) throw new Error("No se pudo obtener el dólar oficial.");
        const data = await response.json();
        return Number(data.venta || data.promedio || data.compra);
      }

      async function getCryptoARS() {
        const response = await fetch(
          "https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=ars"
        );
        if (!response.ok) throw new Error("No se pudo obtener la cotización de cripto.");
        const data = await response.json();
        return {
          btc: Number(data.bitcoin?.ars),
          eth: Number(data.ethereum?.ars),
        };
      }

      async function updateAll() {
        grid.classList.add("loading");
        hideError();

        try {
          const [usd, crypto] = await Promise.all([getDollarARS(), getCryptoARS()]);

          const values = {
            usd,
            btc: crypto.btc,
            eth: crypto.eth,
          };

          Object.entries(values).forEach(([key, value]) => {
            if (!Number.isFinite(value)) throw new Error(`Dato inválido para ${key}.`);
            ids[key].value.textContent = formatARS(value);
            setChangePill(key, value);
          });

          lastUpdate.textContent = `Última actualización: ${new Date().toLocaleString("es-AR")}`;
        } catch (error) {
          showError(`Error al actualizar cotizaciones: ${error.message}`);
        } finally {
          grid.classList.remove("loading");
        }
      }

      refreshButton.addEventListener("click", updateAll);
      updateAll();
      setInterval(updateAll, 60_000);
    </script>
  </body>
</html>
